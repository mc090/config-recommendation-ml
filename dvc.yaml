stages:
  pipeline_init:
    cmd: python -m src.pipeline_init
    deps:
      - src/pipeline_init.py
      - src/config.py
      - src/utils.py
    outs:
      - logs/pipeline_init.json

  fetch_raw:
    cmd: python -m src.data.fetch_raw
    deps:
      - logs/pipeline_init.json
      - src/data/fetch_raw.py
      - src/data/utils.py
      - src/config.py
    outs:
      - data/raw/raw_metadata.json

  extract_structure:
    cmd: python -m src.data.extract_structure
    deps:
      - src/data/extract_structure.py
      - src/data/utils.py
      - data/raw/raw_metadata.json
      - src/config.py
    outs:
      - data/interim/structure.json

  enrich_content:
    cmd: python -m src.data.enrich_content
    deps:
      - src/data/enrich_content.py
      - src/data/utils.py
      - data/interim/structure.json
      - src/config.py
    outs:
      - data/interim/structure_enriched.json

  compute_features:
    cmd: python -m src.data.compute_features
    deps:
      - src/data/compute_features.py
      - src/data/utils.py
      - data/interim/structure_enriched.json
      - src/config.py
    outs:
      - data/interim/computed_features.json

  build_dataset:
    cmd: python -m src.data.build_dataset
    deps:
      - src/data/build_dataset.py
      - src/data/utils.py
      - data/interim/computed_features.json
      - src/config.py
    # Note: No outs specified - versioned directories are created but not tracked by DVC
    # This allows multiple dataset versions to coexist without DVC removing old versions
