repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.8 
    hooks:
      - id: ruff
        name: ruff (lint & fix)
        args: [--fix] 
      - id: ruff-format
        name: ruff (format)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: [types-requests, types-toml, pandas-stubs]
        args: [--ignore-missing-imports, --no-strict-optional]
