services:
  base:
    build:
      context: .
      dockerfile: Dockerfile
    image: config-ml:latest
    container_name: config-ml-base
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./notebooks:/app/notebooks

      - ./data:/app/data
      - ./logs:/app/logs

      - ./.env:/app/.env

    environment:
      - PYTHONUNBUFFERED=1

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

    command: bash

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    image: config-ml:latest
    container_name: config-ml-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./src:/app/src
      - ./notebooks:/app/notebooks
      - ./data:/app/data
      - ./.env:/app/.env

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

    command: >
      bash -c "jupyter notebook  --ip=0.0.0.0  --port=8888  --no-browser  --allow-root  --NotebookApp.token=''  --NotebookApp.password=''"
